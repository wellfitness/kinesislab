<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simon - NeuroFit Dual</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="../../css/tool-base.css">
  <style>
    .simon-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; max-width: 400px; aspect-ratio: 1/1; }
    .simon-btn { border-radius: 20px; opacity: 0.3; transition: all 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
    .simon-btn.lit { opacity: 1; transform: scale(1.05); box-shadow: 0 0 30px currentColor; }
  </style>
</head>
<body>
  <section class="view-execution">
    <header class="exec-header">
      <h2 style="color: var(--turquesa-400); font-family: var(--font-display); font-size: 1.5rem;">NEUROFIT<span style="color:var(--gris-400); font-weight: 300;">DUAL</span></h2>
      <button class="btn-secondary" onclick="window.location.href='../../index.html'"><span class="material-icons">arrow_back</span> Volver</button>
    </header>
    <div class="exec-toolbar">
      <div id="cadenceGroup" class="control-group">
        <span class="control-label">Cadencia:</span>
        <select class="speed-select" onchange="tool.changeSpeed(this.value)">
          <option value="6000">Lenta (6s)</option>
          <option value="4000" selected>Media (4s)</option>
          <option value="2000">Rápida (2s)</option>
        </select>
      </div>
      <button id="btnPlayPause" class="btn-primary" onclick="tool.togglePlay()">
        <span id="playIcon" class="material-icons">play_arrow</span><span id="playText">START</span>
      </button>
    </div>
    <div id="stimulusContainer" class="stimulus-area">
      <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%;">
        <p id="simonInstruction" class="stimulus-instruction" style="color: white; margin-bottom: var(--space-8);">Memoriza la secuencia...</p>
        <div class="simon-grid">
          <div id="simon-0" class="simon-btn" style="background-color: var(--turquesa-400); color: var(--turquesa-400);"></div>
          <div id="simon-1" class="simon-btn" style="background-color: var(--tulip-tree-400); color: var(--tulip-tree-400);"></div>
          <div id="simon-2" class="simon-btn" style="background-color: var(--rosa-400); color: var(--rosa-400);"></div>
          <div id="simon-3" class="simon-btn" style="background-color: #3b82f6; color: #3b82f6;"></div>
        </div>
      </div>
    </div>
  </section>
  <script src="simon.js"></script>
</body>
</html>
