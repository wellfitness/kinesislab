<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>N-Back - NeuroFit Dual</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="../../css/tool-base.css">
  <style>
    .nback-stimulus {
      width: clamp(140px, 35vw, 220px);
      height: clamp(140px, 35vw, 220px);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--gris-700);
      transition: all 200ms ease-out;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .nback-stimulus .shape {
      width: 70%;
      height: 70%;
      transition: all 200ms;
    }
    .nback-history {
      display: flex;
      gap: 8px;
      margin-top: var(--space-3);
      align-items: center;
    }
    .history-dot {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 2px solid var(--gris-600);
      transition: all 200ms;
    }
    .history-dot.current {
      border-color: white;
      transform: scale(1.2);
    }
    .match-btn {
      margin-top: var(--space-3);
      padding: 16px 48px;
      border-radius: 12px;
      border: 3px solid var(--turquesa-400);
      background: transparent;
      color: var(--turquesa-400);
      font-family: var(--font-display);
      font-size: 1.25rem;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 150ms;
      min-height: 56px;
      min-width: 180px;
      text-transform: uppercase;
    }
    .match-btn:active, .match-btn.pressed {
      background: var(--turquesa-600);
      color: white;
      transform: scale(0.95);
    }
    .match-btn:disabled {
      opacity: 0.3;
      cursor: default;
    }
    .stats-bar {
      display: flex;
      gap: var(--space-3);
      justify-content: center;
      flex-wrap: wrap;
      padding: var(--space-1) var(--space-2);
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
      margin-top: var(--space-2);
    }
    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 64px;
    }
    .stat-value {
      font-size: 1.5rem;
      font-weight: bold;
      font-family: var(--font-display);
    }
    .stat-label {
      font-size: 0.7rem;
      color: var(--gris-400);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .n-indicator {
      background: var(--gris-800);
      border: 1px solid var(--gris-600);
      border-radius: 8px;
      padding: 4px 12px;
      color: var(--turquesa-400);
      font-family: var(--font-display);
      font-size: 0.9rem;
    }
    .feedback-flash {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 3rem;
      pointer-events: none;
      opacity: 0;
      transition: opacity 200ms;
    }
    .feedback-flash.show { opacity: 1; }
  </style>
</head>
<body>
  <section class="view-execution">
    <header class="exec-header">
      <h2 style="color: var(--turquesa-400); font-family: var(--font-display); font-size: 1.5rem;">NEUROFIT<span style="color:var(--gris-400); font-weight: 300;">DUAL</span></h2>
      <button class="btn-secondary" onclick="window.location.href='../../index.html'"><span class="material-icons">arrow_back</span> Volver</button>
    </header>
    <div class="exec-toolbar">
      <div class="control-group">
        <span class="control-label">Nivel:</span>
        <select id="nbackLevel" class="speed-select" onchange="tool.changeN(this.value)">
          <option value="1" selected>1-Back</option>
          <option value="2">2-Back</option>
        </select>
      </div>
      <div class="control-group">
        <span class="control-label">Cadencia:</span>
        <select class="speed-select" onchange="tool.changeSpeed(this.value)">
          <option value="4000">Lenta (4s)</option>
          <option value="3000" selected>Media (3s)</option>
          <option value="2000">R&aacute;pida (2s)</option>
        </select>
      </div>
      <button id="btnPlayPause" class="btn-primary" onclick="tool.togglePlay()">
        <span id="playIcon" class="material-icons">play_arrow</span><span id="playText">START</span>
      </button>
    </div>
    <div id="stimulusContainer" class="stimulus-area">
      <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative;">
        <p class="stimulus-instruction">Toca cuando el est&iacute;mulo coincida con el de <span class="n-indicator" id="nLabel">1</span> posiciones atr&aacute;s</p>
        <div id="nbackStimulus" class="nback-stimulus">
          <div class="shape" id="shapeDisplay"></div>
        </div>
        <div class="nback-history" id="historyBar"></div>
        <button id="matchBtn" class="match-btn" onclick="tool.handleMatch()" disabled>
          <span class="material-icons" style="vertical-align: middle; margin-right: 4px;">check_circle</span> COINCIDE
        </button>
        <div class="stats-bar">
          <div class="stat-item"><span id="statHits" class="stat-value" style="color: var(--turquesa-400);">0</span><span class="stat-label">Aciertos</span></div>
          <div class="stat-item"><span id="statMisses" class="stat-value" style="color: var(--tulip-tree-400);">0</span><span class="stat-label">Omisiones</span></div>
          <div class="stat-item"><span id="statFalse" class="stat-value" style="color: var(--rosa-400);">0</span><span class="stat-label">Falsos</span></div>
          <div class="stat-item"><span id="statTotal" class="stat-value" style="color: white;">0</span><span class="stat-label">Ronda</span></div>
        </div>
        <div id="feedbackFlash" class="feedback-flash"></div>
      </div>
    </div>
  </section>
  <script src="nback.js"></script>
</body>
</html>
