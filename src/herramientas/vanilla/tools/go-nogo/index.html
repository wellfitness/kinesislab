<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Go / No-Go - NeuroFit Dual</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="../../css/tool-base.css">
  <style>
    .go-circle {
      width: clamp(160px, 40vw, 280px);
      height: clamp(160px, 40vw, 280px);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 120ms ease-out;
      box-shadow: 0 0 40px rgba(0,0,0,0.4);
    }
    .go-circle.flash { transform: scale(1.08); }
    .go-circle .material-icons { font-size: clamp(64px, 12vw, 100px); color: white; }
    .go-label {
      font-family: var(--font-display);
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-top: var(--space-3);
    }
    .stats-bar {
      display: flex;
      gap: var(--space-3);
      justify-content: center;
      flex-wrap: wrap;
      padding: var(--space-1) var(--space-2);
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
      margin-top: var(--space-2);
    }
    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 64px;
    }
    .stat-value {
      font-size: 1.5rem;
      font-weight: bold;
      font-family: var(--font-display);
    }
    .stat-label {
      font-size: 0.7rem;
      color: var(--gris-400);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .wait-state {
      color: var(--gris-500);
      font-size: 1.25rem;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <section class="view-execution">
    <header class="exec-header">
      <h2 style="color: var(--turquesa-400); font-family: var(--font-display); font-size: 1.5rem;">NEUROFIT<span style="color:var(--gris-400); font-weight: 300;">DUAL</span></h2>
      <button class="btn-secondary" onclick="window.location.href='../../index.html'"><span class="material-icons">arrow_back</span> Volver</button>
    </header>
    <div class="exec-toolbar">
      <div class="control-group">
        <span class="control-label">Nivel:</span>
        <select id="levelSelect" class="speed-select" onchange="tool.changeLevel(this.value)">
          <option value="easy">F&aacute;cil (80/20)</option>
          <option value="medium" selected>Medio (60/40)</option>
          <option value="hard">Dif&iacute;cil (50/50)</option>
        </select>
      </div>
      <div class="control-group">
        <span class="control-label">Cadencia:</span>
        <select class="speed-select" onchange="tool.changeSpeed(this.value)">
          <option value="3000">Lenta (3s)</option>
          <option value="2000" selected>Media (2s)</option>
          <option value="1200">R&aacute;pida (1.2s)</option>
        </select>
      </div>
      <button id="btnPlayPause" class="btn-primary" onclick="tool.togglePlay()">
        <span id="playIcon" class="material-icons">play_arrow</span><span id="playText">START</span>
      </button>
    </div>
    <div id="stimulusContainer" class="stimulus-area" onclick="tool.handleTap()">
      <div style="display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <p class="stimulus-instruction">Toca en VERDE. No toques en ROJO.</p>
        <div id="goCircle" class="go-circle" style="background: var(--gris-700);">
          <span class="material-icons">touch_app</span>
        </div>
        <div id="goLabel" class="go-label wait-state">Preparado</div>
        <div class="stats-bar">
          <div class="stat-item"><span id="statHits" class="stat-value" style="color: var(--turquesa-400);">0</span><span class="stat-label">Aciertos</span></div>
          <div class="stat-item"><span id="statMisses" class="stat-value" style="color: var(--tulip-tree-400);">0</span><span class="stat-label">Omisiones</span></div>
          <div class="stat-item"><span id="statFalse" class="stat-value" style="color: var(--rosa-400);">0</span><span class="stat-label">Falsos</span></div>
          <div class="stat-item"><span id="statRT" class="stat-value" style="color: white;">-- ms</span><span class="stat-label">T. Reacci&oacute;n</span></div>
        </div>
      </div>
    </div>
  </section>
  <script src="go-nogo.js"></script>
</body>
</html>
