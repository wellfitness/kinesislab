<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#00bec8">
  <link rel="manifest" href="../../../../../manifest.json">
  <link rel="icon" type="image/svg+xml" href="../../../../../assets/icon.svg">
  <title>Laberinto Motor - KinesisLab</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Sharp" rel="stylesheet">
  <link rel="stylesheet" href="../../css/tool-base.css">
</head>
<body>
  <section class="view-execution">
    <header class="exec-header">
      <h2 style="color: var(--turquesa-400); font-family: var(--font-display); font-size: 1.5rem;">Laberinto Motor</h2>
      <button class="btn-secondary" onclick="window.location.href='../../dashboard.html'"><span class="material-symbols-sharp">arrow_back</span> Volver</button>
    </header>
    <div class="exec-toolbar">
      <div id="cadenceGroup" class="control-group">
        <span class="control-label">Cadencia:</span>
        <select class="speed-select" onchange="tool.changeSpeed(this.value)">
          <option value="6000">Lenta (6s)</option>
          <option value="4000" selected>Media (4s)</option>
          <option value="2000">Rápida (2s)</option>
        </select>
      </div>
      <div id="staticGroup" class="control-group">
        <span class="control-label">Dificultad:</span>
        <select id="diffSelect" class="speed-select">
          <option value="facil">Fácil</option>
          <option value="medio" selected>Medio</option>
          <option value="dificil">Difícil</option>
        </select>
      </div>
      <button id="btnPlayPause" class="btn-primary" onclick="tool.togglePlay()">
        <span id="playIcon" class="material-symbols-sharp">play_arrow</span><span id="playText">START</span>
      </button>
    </div>
    <div id="stimulusContainer" class="stimulus-area">
      <div style="width: 100%; height: 100%; display: flex; justify-content: center; align-items: center;" onclick="tool.runMaze()">
        <canvas id="mazeCanvas" style="max-width: 90vmin; max-height: 90vmin; background-color: white; border-radius: 12px; box-shadow: var(--shadow-two-layer-lg);"></canvas>
      </div>
    </div>
  </section>
  <script src="maze.js"></script>
</body>
</html>
