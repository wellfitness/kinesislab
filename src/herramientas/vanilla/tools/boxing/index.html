<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fit Boxing - NeuroFit Dual</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="../../css/tool-base.css">
</head>
<body>
  <section class="view-execution">
    <header class="exec-header">
      <h2 style="color: var(--turquesa-400); font-family: var(--font-display); font-size: 1.5rem; letter-spacing: 1px;">
        NEUROFIT<span style="color:var(--gris-400); font-weight: 300;">DUAL</span>
      </h2>
      <button id="btnVolver" class="btn-secondary" onclick="window.location.href='../../index.html'">
        <span class="material-icons">arrow_back</span> Volver a Batería
      </button>
    </header>

    <div class="exec-toolbar">
      <div id="cadenceGroup" class="control-group">
        <span class="control-label">Cadencia:</span>
        <select id="speedSelect" class="speed-select" onchange="tool.changeSpeed(this.value)">
          <option value="6000">Lenta (6s)</option>
          <option value="4000" selected>Media (4s)</option>
          <option value="2000">Rápida (2s)</option>
        </select>
      </div>
      <button id="btnPlayPause" class="btn-primary" onclick="tool.togglePlay()">
        <span id="playIcon" class="material-icons">play_arrow</span>
        <span id="playText">START</span>
      </button>
    </div>

    <div id="stimulusContainer" class="stimulus-area">
      <div class="stimulus-content" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%;">
        <span class="material-icons" style="font-size: 4rem; color: var(--rosa-400); margin-bottom: 1rem;">sports_mma</span>
        <p class="stimulus-instruction" style="color: var(--rosa-300);">Atenta al Combo:</p>
        <div id="boxingText" class="text-huge" style="transition: all 0.2s;">Combo</div>
      </div>
    </div>
  </section>
  <script src="boxing.js"></script>
</body>
</html>
