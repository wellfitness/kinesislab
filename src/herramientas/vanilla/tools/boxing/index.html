<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fit Boxing - NeuroFit Dual</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="../../css/tool-base.css">
  <style>
    /* Slider Range styling Odisea Antifrágil (Rosa Fuerte) */
    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      background: transparent;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 20px;
      width: 20px;
      border-radius: 50%;
      background: var(--rosa-600);
      cursor: pointer;
      margin-top: -8px;
    }
    input[type=range]::-webkit-slider-runnable-track {
      width: 100%;
      height: 4px;
      cursor: pointer;
      background: var(--gris-600);
      border-radius: 4px;
    }

    .status-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 40vh;
      width: 100%;
      text-align: center;
    }

    .punch-badge {
      padding: 8px 16px;
      border-radius: 12px;
      font-size: 1.25rem;
      font-weight: bold;
      background: var(--gris-800);
      color: var(--gris-300);
      transition: all 200ms ease;
    }

    .punch-badge.active {
      background: var(--rosa-600);
      color: white;
      transform: scale(1.15);
      box-shadow: 0 0 20px rgba(225, 29, 72, 0.6);
    }
    
    .punch-badge.past {
      background: var(--gris-700);
      color: var(--gris-500);
    }

    .pulse-text {
      animation: pulseOpacity 1.5s infinite;
    }
    @keyframes pulseOpacity {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body style="background-color: var(--gris-900); color: white;">

  <section class="view-execution">
    <header class="exec-header">
      <h2 style="color: var(--turquesa-400); font-family: var(--font-display); font-size: 1.5rem; letter-spacing: 1px;">
        NEUROFIT<span style="color:var(--gris-400); font-weight: 300;">DUAL</span>
      </h2>
      <button id="btnVolver" class="btn-secondary" onclick="window.location.href='../../index.html'">
        <span class="material-icons">arrow_back</span> Volver a Batería
      </button>
    </header>

    <div class="exec-toolbar" id="configPanel" style="flex-direction: column; align-items: stretch; gap: 1rem; padding: 1rem 2rem;">
      <h3 style="color: var(--rosa-400); font-family: var(--font-display);">Configuración Fit Boxing</h3>
      
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem;">
        <div>
          <label style="font-size: 0.85rem; color: var(--gris-400);">Golpes por combinación: <span id="lblPunch" style="color:white; font-weight:bold;">4</span></label>
          <input type="range" id="punchCount" min="2" max="20" value="4">
        </div>

        <div>
          <label style="font-size: 0.85rem; color: var(--gris-400);">Velocidad de voz: <span id="lblSpeech" style="color:white; font-weight:bold;">1.0x</span></label>
          <input type="range" id="speechRate" min="0.8" max="1.5" step="0.1" value="1.0">
        </div>
      </div>

      <div style="display: flex; gap: 0.5rem; align-items: center; justify-content: flex-start; margin-top: 0.5rem;">
        <input type="checkbox" id="includeDefensive" style="width: 20px; height: 20px; accent-color: var(--rosa-600);">
        <label for="includeDefensive" style="font-size: 0.9rem;">Incluir movimientos defensivos (esquivas, bloqueos)</label>
      </div>

      <div style="display: flex; justify-content: center; margin-top: 1rem;">
        <button id="btnPlayPause" class="btn-critical" onclick="tool.handleStartStop()" style="width: 100%; max-width: 300px; justify-content: center;">
          <span id="playIcon" class="material-icons">play_arrow</span>
          <span id="playText">EMPEZAR</span>
        </button>
      </div>
    </div>

    <!-- PANTALLA PRINCIPAL DE ENTRENAMIENTO -->
    <div id="stimulusContainer" class="stimulus-area" style="flex-direction: column;">
      
      <!-- ESTADO: IDLE -->
      <div id="stateIdle" class="status-panel">
        <span class="material-icons" style="font-size: 5rem; color: var(--gris-600); margin-bottom: 1rem;">sports_mma</span>
        <p style="color: var(--gris-400); font-size: 1.2rem;">Configura y pulsa EMPEZAR para comenzar</p>
      </div>

      <!-- ESTADO: COMBOS -->
      <div id="stateCombos" class="status-panel" style="display: none;">
        <p id="lblComboCount" style="color: var(--gris-500); font-size: 1.25rem; font-family: var(--font-display); margin-bottom: 2rem; letter-spacing: 1px;">Combinación #1</p>
        
        <div id="comboGrid" style="display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center; max-width: 800px;">
          <!-- sequence badges -->
        </div>

        <p id="lblPause" class="pulse-text" style="color: var(--gris-500); font-size: 1rem; margin-top: 3rem; display: none;">Preparando siguiente combinación...</p>
      </div>

    </div>
  </section>

  <script src="boxing.js"></script>
</body>
</html>
