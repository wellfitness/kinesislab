<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matriz Visoespacial - NeuroFit Dual</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="../../css/tool-base.css">
  <style>
    .matrix-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 300px; height: 300px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px;}
    .matrix-cell { background: rgba(255,255,255,0.1); border-radius: 8px; transition: all 0.1s; }
    .matrix-cell.active { background: var(--rosa-400); box-shadow: 0 0 20px var(--rosa-400); }
  </style>
</head>
<body>
  <section class="view-execution">
    <header class="exec-header">
      <h2 style="color: var(--turquesa-400); font-family: var(--font-display); font-size: 1.5rem;">NEUROFIT<span style="color:var(--gris-400); font-weight: 300;">DUAL</span></h2>
      <button class="btn-secondary" onclick="window.location.href='../../index.html'"><span class="material-icons">arrow_back</span> Volver</button>
    </header>
    <div class="exec-toolbar">
      <div id="cadenceGroup" class="control-group">
        <span class="control-label">Cadencia:</span>
        <select class="speed-select" onchange="tool.changeSpeed(this.value)">
          <option value="6000">Lenta (6s)</option>
          <option value="4000" selected>Media (4s)</option>
          <option value="2000">Rápida (2s)</option>
        </select>
      </div>
      <button id="btnPlayPause" class="btn-primary" onclick="tool.togglePlay()">
        <span id="playIcon" class="material-icons">play_arrow</span><span id="playText">START</span>
      </button>
    </div>
    <div id="stimulusContainer" class="stimulus-area">
      <div style="width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center;" onclick="tool.runMatrix()">
        <p class="stimulus-instruction" id="matrixInstruction">Memoriza el patrón</p>
        <div class="matrix-grid">
          <div class="matrix-cell" id="cell-0"></div><div class="matrix-cell" id="cell-1"></div><div class="matrix-cell" id="cell-2"></div>
          <div class="matrix-cell" id="cell-3"></div><div class="matrix-cell" id="cell-4"></div><div class="matrix-cell" id="cell-5"></div>
          <div class="matrix-cell" id="cell-6"></div><div class="matrix-cell" id="cell-7"></div><div class="matrix-cell" id="cell-8"></div>
        </div>
      </div>
    </div>
  </section>
  <script src="matrix.js"></script>
</body>
</html>
